name: Preview Smoke

on:
  deployment_status:

jobs:
  smoke:
    if: >
      github.event.deployment_status.state == 'success' &&
      github.event.deployment.environment == 'Preview'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node from .nvmrc
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Verify preview deployment URL exists
        run: |
          test -n "${PREVIEW_URL}" || (echo "Missing preview deployment URL from deployment_status event." && exit 1)
        env:
          PREVIEW_URL: ${{ github.event.deployment_status.environment_url }}

      - name: Check bypass secret is configured
        id: bypass
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          if [ -z "$VERCEL_AUTOMATION_BYPASS_SECRET" ]; then
            echo "::warning::VERCEL_AUTOMATION_BYPASS_SECRET is not set. Smoke tests skipped — Vercel deployment protection will block requests. Add the secret from Vercel project settings → Deployment Protection."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run preview smoke suite
        if: steps.bypass.outputs.skip != 'true'
        env:
          PLAYWRIGHT_BASE_URL: ${{ github.event.deployment_status.environment_url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: npm run test:smoke

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: preview-playwright-report
          path: playwright-report
